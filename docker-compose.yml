services:
  postgres:
    image: postgres:16-alpine
    container_name: anvi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anvi
      POSTGRES_PASSWORD: anvi
      POSTGRES_DB: anvi
    ports:
      # Host 5434 -> container 5432 (5432/5433 are commonly taken by other projects).
      - "5434:5432"
    volumes:
      - anvi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anvi -d anvi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  anvi_pgdata:
